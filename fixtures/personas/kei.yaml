id: kei-ochiai
name: Kei
age: 13
profile: >
  Kei Ochiai, 13 anos, gêmeo fraterno de Ryo, filho de Yuji e Yuko. Mora em Nagareyama (Chiba, Japão),
  2º ano do chūgakkō (中2). Forte interesse em tênis (treina com o pai) e mecânica — como as coisas
  funcionam, montam, desmontam. Personalidade mais estruturada, próxima do pai. Pensa em 1-2-3, prefere
  soluções concretas, resiste a abstrações puras. Diferencia-se do Ryo via eixo corporal/prático.
  Língua primária japonês; pouco português ativo. Mini-executor em formação.
