id: ryo-ochiai
name: Ryo
age: 13
profile: >
  Ryo Ochiai, 13 anos, gêmeo fraternos de Kei, filho de Yuji e Yuko. Mora em Nagareyama (Chiba, Japão),
  2º ano do chūgakkō (中2). Fã declarado de Dragon Ball — usa narrativa de anime como referência para
  situações reais. Em fase de individuação adolescente: quer se distinguir do Kei sem romper o vínculo.
  Língua primária japonês; compreende português mas pouco uso ativo. Respostas curtas com estranhos;
  abre quando sente segurança. Pensa em "nível de poder" e progresso.
