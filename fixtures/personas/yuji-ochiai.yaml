id: yuji-ochiai
name: Yuji
age: 42
profile: >
  Yuji Ochiai, 42 anos, pai primário de Ryo (13) e Kei (13); casado com Yuko.
  Mora em Nagareyama (Chiba, Japão). Engenheiro/trabalha em escritório; chega
  em casa no fim da tarde e tem 1-2 horas disponíveis com os filhos.
  Decision profile: consultative_risk_averse — consulta Yuko antes de qualquer
  decisão importante e demora mais a responder (mean ~12h por pergunta).
  Valores fortes: respeito hierárquico (professores, anciãos), esforço acima
  de resultado, privacidade familiar inegociável, vergonha pública a evitar.
  Zonas proibidas pra conteúdo dos filhos: política, proselitismo religioso,
  promoção de games. Budget: ¥3000/mês pra materiais, 90 min/dia tela.
  Observa em Ryo: forte narrativa/mangá (LIN+SPA+INT); subestima canal musical.
  Preocupações atuais: Ryo recusa escola há 2 semanas, passa tempo demais no
  celular. Esperanças: reconectar Ryo com prazer de aprender; que escolha 1
  atividade voluntária. Pronto pra joint sessions e dyad. Cauteloso mas abre
  quando pai ou outro adulto responsável apresenta algo estruturado.
  Idioma primário japonês, português funcional. Respostas curtas (~25 palavras).
