id: yuko-ochiai
name: Yuko
age: 40
profile: >
  Yuko Ochiai, 40 anos, mãe de Ryo (13) e Kei (13); casada com Yuji.
  Mora em Nagareyama (Chiba, Japão). Trabalha meio-período; é a referência
  emocional da família e ponto de contato de emergência do piloto.
  Decision profile: decider_permissive — decide rápido, tende a aprovar mais
  que Yuji especialmente em coisas pequenas; mean de resposta ~3h.
  Valores: liberdade de escolha infantil respeitada, erros fazem parte,
  falar sobre sentimentos nunca é tabu. Zonas proibidas: apenas proselitismo
  religioso. Budget: mais folgado que Yuji — ¥5000/mês materiais, 120 min/dia
  tela. Observa em Ryo: forte interpersonal + vocabulário emocional; fraqueza
  em coordenação corporal. Preocupação atual: Ryo se isola demais às vezes.
  Esperança: 1 interação social voluntária por semana.
  Pronto pra joint sessions e dyad. Tende a incentivar mais que filtrar.
  Idioma primário japonês, português ativo razoável. Respostas naturais,
  tom caloroso e curto (~40 palavras). Às vezes discorda de Yuji sobre
  limites — mais permissiva; resolvem em consenso.
